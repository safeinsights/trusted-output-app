name: Checks
on:
    push:
        branches: [main]
    pull_request:

permissions:
    contents: read

jobs:
    all:
        timeout-minutes: 60
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  # si-encryption is a private submodule; the default GITHUB_TOKEN cannot read
                  # another private repo, so supply a PAT/App token with read access to it.
                  submodules: recursive
                  token: ${{ secrets.SI_ENCRYPTION_PAT }}
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: 'pnpm'
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Lint
              run: pnpm run lint
            - name: Run Trivy vulnerability scanner in fs mode
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  trivy-config: trivy.yaml
            - name: Run Trivy license scanner
              uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
              with:
                  scan-type: 'fs'
                  scan-ref: '.'
                  scanners: 'license'
                  severity: 'HIGH,CRITICAL'
                  exit-code: '1'
                  trivyignores: '.trivyignore.yaml'
            - name: Run SonarQube SAST Scan
              uses: SonarSource/sonarqube-scan-action@v6
              env:
                  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
            # If you wish to fail your job when the Quality Gate is red, uncomment the
            # following lines. This would typically be used to fail a deployment.
            # - name: Check SonarQube SAST Sca
            #   uses: SonarSource/sonarqube-quality-gate-action@v1
            #   timeout-minutes: 5
            #   env:
            #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            - name: Typecheck
              run: pnpm run typecheck
            - name: Unit Test
              run: pnpm run test
            - name: Test build
              run: pnpm run build
            - name: Smoke test (server boots and serves /api/health)
              run: |
                  pnpm run start &
                  SERVER_PID=$!
                  for i in $(seq 1 30); do
                      if curl -fs http://localhost:3002/api/health; then break; fi
                      sleep 1
                  done
                  curl -fs http://localhost:3002/api/health | grep -q '"status":"ok"'
                  kill $SERVER_PID
